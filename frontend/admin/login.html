<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="login-page">

  <canvas id="creative-bg"></canvas>

  <div class="login-box">

    <!-- LOGO -->
    <div class="login-logo">
      <i class="fas fa-user-shield"></i>
      <h1>Samson KPODAMAKOU</h1>
      <p>Espace Admin</p>
      <div class="login-divider"></div>
    </div>

    <!-- ERREUR -->
    <div class="error-alert" id="errorAlert" style="display:none;">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorMessage">Identifiants incorrects.</span>
    </div>

    <!-- FORMULAIRE -->
    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="Votre identifiant" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="password-container">
        <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
        <button class="toggle-password" id="togglePassword" type="button">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin">
      <i class="fas fa-sign-in-alt"></i>
      Se connecter
    </button>

    <div class="loading-indicator" id="loadingIndicator" style="display:none;">
      <div class="loading-spinner"></div>
      <span>Vérification...</span>
    </div>

    <!-- FOOTER -->
    <div class="login-footer-text">
      <i class="fas fa-lock"></i>
      Accès restreint — Administrateur uniquement
    </div>

  </div>

  <script src="../assets/js/backed.js"></script>
  <script src="../assets/js/admin-login.js"></script>
</body>
</html>
